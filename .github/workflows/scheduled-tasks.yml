name: 定时任务

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: '要运行的任务'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - eval
          - report

permissions:
  contents: write
  issues: write

jobs:
  # ============================================================
  # Job 1: 解题答案一致性评测
  # ============================================================
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run evaluation analysis
        id: eval
        run: |
          echo "📊 运行解题答案一致性评测..."
          python3 解题答案一致性评测/analyze_v3.py
          echo "✅ 评测完成"

      - name: Commit updated report if changed
        run: |
          if [[ -n $(git status --porcelain 解题答案一致性评测/outputs/) ]]; then
            echo "📝 报告有更新，提交变更..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add 解题答案一致性评测/outputs/
            git commit -m "📊 [自动化] 更新评测报告 - $(date +%Y-%m-%d)"
            git push
            echo "✅ 已提交并推送"
          else
            echo "📭 报告无变化，跳过提交"
          fi

  # ============================================================
  # Job 2: 生成其他报告
  # ============================================================
  report:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.task == 'all' || github.event.inputs.task == 'report' }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install oss2 openpyxl

      - name: Generate reports
        run: |
          echo "📊 检查可生成的报告..."
          # 如果 raw_data.json 有变更，重新生成 Polymarket 报告
          if [[ -f polymarket_report.html ]]; then
            echo "✅ polymarket_report.html 已存在"
          fi
          echo "✅ 报告检查完成"

  # ============================================================
  # Job 3: 失败通知
  # ============================================================
  notify:
    needs: [eval, report]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];

            // Check if a failure issue already exists for today
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'bug',
              state: 'open'
            });

            const existingIssue = issues.find(i =>
              i.title.includes(`定时任务失败 - ${today}`)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner, repo,
                title: `⚠️ 定时任务失败 - ${today}`,
                labels: ['bug'],
                body: `定时任务执行失败，请查看 [workflow run](${runUrl}) 了解详情。`
              });
              console.log('✅ 已创建失败通知 Issue');
            } else {
              console.log('📭 今日已有失败通知 Issue，跳过');
            }
