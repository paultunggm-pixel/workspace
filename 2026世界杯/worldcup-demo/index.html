<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2026 世界杯 AI 频道</title>
<style>
:root {
  --bg: #f0f2f5;
  --card: #fff;
  --green: #059669;
  --green-light: #ecfdf5;
  --red: #dc2626;
  --red-light: #fef2f2;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --gold: #d97706;
  --gold-light: #fffbeb;
  --text: #111827;
  --text2: #4b5563;
  --text3: #9ca3af;
  --border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== Fixed Header ===== */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.top-bar .logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #059669, #047857);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.top-bar h1 {
  font-size: 15px;
  font-weight: 700;
  flex: 1;
}
.top-bar .countdown-mini {
  font-size: 11px;
  color: var(--green);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  background: var(--green-light);
  padding: 4px 10px;
  border-radius: 12px;
  white-space: nowrap;
}
.top-bar .live-dot {
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  display: inline-block;
  margin-right: 4px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ===== Feed Container ===== */
main {
  max-width: 500px;
  margin: 0 auto;
  padding: 12px 14px;
  /* space for fixed bottom input */
  padding-bottom: calc(96px + var(--safe-bottom));
}

/* ===== Section Header ===== */
.section-head {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 15px;
  font-weight: 700;
  margin: 20px 0 10px;
  padding: 0 2px;
}
.section-head .s-icon { font-size: 18px; }
.section-head .s-more {
  margin-left: auto;
  font-size: 12px;
  color: var(--green);
  text-decoration: none;
  font-weight: 500;
}

/* ===== My Teams (Expanded) ===== */
.teams-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 2px 0 10px;
}
.teams-row::-webkit-scrollbar { display: none; }
.team-chip {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 20px;
  background: var(--card);
  border: 2px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.team-chip.active {
  border-color: var(--green);
  background: var(--green-light);
  color: var(--green);
}
.team-chip .t-flag { font-size: 18px; }
.team-chip .t-check {
  font-size: 10px;
  color: var(--green);
  font-weight: 800;
}

/* Team detail card */
.team-detail {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  border-left: 3px solid var(--green);
  animation: fadeSlide 0.3s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.team-detail-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.team-detail-flag { font-size: 36px; }
.team-detail-name { font-size: 17px; font-weight: 700; }
.team-detail-group {
  font-size: 12px; color: var(--text2);
  background: #f3f4f6; padding: 3px 10px; border-radius: 10px;
}
.team-detail-match {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  margin-bottom: 6px;
  background: #f9fafb;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}
.team-detail-match:active { background: #f3f4f6; }
.team-detail-match .md-vs {
  font-size: 20px;
  flex: 1; text-align: center;
  font-weight: 700;
  color: var(--text3);
}
.team-detail-match .md-date {
  font-size: 11px; color: var(--text2);
  min-width: 70px; text-align: right;
}
.team-detail-news {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  margin-top: 8px;
  background: var(--green-light);
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}
.team-detail-news .news-dot { color: var(--green); font-weight: 700; }

/* ===== Match Card ===== */
.match-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.match-card.live { border-left: 3px solid var(--red); }
.match-card .mc-top {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--text2);
  margin-bottom: 10px;
}
.match-card .mc-live-tag {
  background: var(--red);
  color: #fff;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  animation: pulse 2s ease-in-out infinite;
}
.match-card .mc-teams {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.match-card .mc-team {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px;
  flex: 1;
}
.match-card .mc-flag { font-size: 36px; }
.match-card .mc-name { font-size: 12px; font-weight: 600; text-align: center; }
.match-card .mc-score { font-size: 26px; font-weight: 800; }
.match-card .mc-vs { font-size: 12px; color: var(--text3); font-weight: 600; flex-shrink: 0; }
.match-card .mc-actions {
  display: flex; gap: 8px;
  margin-top: 8px;
}
.btn-chat {
  flex: 1;
  padding: 8px 12px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 4px;
  transition: all 0.2s;
}
.btn-chat:active { background: #f3f4f6; }
.btn-chat.ai { border-color: var(--green); color: var(--green); background: var(--green-light); }

/* ===== Group Grid ===== */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.group-box {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
}
.group-box:active { border-color: var(--green); }
.group-box .g-name {
  font-weight: 700; color: var(--green);
  margin-bottom: 4px; font-size: 13px;
}
.group-box .g-team {
  padding: 2px 0;
  color: var(--text2);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== Analysis Feed ===== */
.analysis-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.analysis-card .ac-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.analysis-card .ac-badge {
  background: linear-gradient(135deg, #059669, #047857);
  color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 10px;
}
.analysis-card .ac-title {
  font-size: 14px; font-weight: 600;
}
.analysis-card .ac-body {
  font-size: 13px; color: var(--text2);
  line-height: 1.7;
  margin-bottom: 12px;
}
.analysis-card .ac-chat-prompts {
  display: flex; flex-wrap: wrap; gap: 6px;
}

/* ===== Player Card (compact) ===== */
.players-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 2px 0 8px;
}
.players-row::-webkit-scrollbar { display: none; }
.player-mini {
  flex-shrink: 0;
  width: 110px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 1px solid var(--border);
  transition: border-color 0.2s;
}
.player-mini:active { border-color: var(--green); }
.player-mini .pm-flag { font-size: 32px; }
.player-mini .pm-name { font-size: 13px; font-weight: 700; margin: 6px 0 2px; }
.player-mini .pm-info { font-size: 10px; color: var(--text3); margin-bottom: 6px; }
.player-mini .pm-chat {
  font-size: 10px;
  color: var(--green);
  background: var(--green-light);
  padding: 3px 10px;
  border-radius: 10px;
  display: inline-block;
}

/* ===== Fan Tabs ===== */
.fan-tabs {
  display: flex; gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-bottom: 8px;
}
.fan-tabs::-webkit-scrollbar { display: none; }
.fan-tab {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 18px;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.fan-tab.active {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green);
}
.fan-topic {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--card);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  box-shadow: var(--shadow);
  cursor: pointer;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
}
.fan-topic .ft-icon { font-size: 20px; flex-shrink: 0; }
.fan-topic .ft-text { flex: 1; }
.fan-topic .ft-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
.fan-topic .ft-arrow { color: var(--text3); }

/* ===== Poll ===== */
.poll-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.poll-card .poll-q { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.poll-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  background: #f9fafb;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  position: relative;
  overflow: hidden;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.poll-opt.voted { border-color: var(--green); }
.poll-opt .po-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: rgba(5,150,105,0.08);
  border-radius: 10px;
  transition: width 0.6s ease;
}
.poll-opt .po-text { position: relative; z-index: 1; flex: 1; }
.poll-opt .po-pct { position: relative; z-index: 1; font-weight: 700; color: var(--green); font-size: 13px; }
.poll-votes { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ===== Chat Messages in Feed ===== */
.chat-msg {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.65;
  margin-bottom: 8px;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--green);
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start;
  background: #fff;
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg .msg-sender {
  font-size: 10px; font-weight: 700; margin-bottom: 4px;
  opacity: 0.7;
}

/* ===== Bottom Input ===== */
.input-dock {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  z-index: 200;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 8px 14px var(--safe-bottom);
  max-width: 500px;
  margin: 0 auto;
}
.input-capsules {
  display: flex; gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 2px 0 6px;
}
.input-capsules::-webkit-scrollbar { display: none; }
.input-capsule {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text2);
  transition: all 0.2s;
}
.input-capsule:active { border-color: var(--green); color: var(--green); background: var(--green-light); }
.input-capsule.hot {
  background: #fef3c7;
  border-color: #f59e0b;
  color: #92400e;
}
.input-row {
  display: flex; gap: 8px;
  align-items: center;
}
.input-row input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 22px;
  border: 1.5px solid var(--border);
  background: #f9fafb;
  font-size: 14px;
  outline: none;
  color: var(--text);
  transition: border-color 0.2s;
}
.input-row input:focus { border-color: var(--green); background: #fff; }
.input-row .send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--green);
  border: none;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.input-row .send-btn:active { transform: scale(0.95); }

/* Toast */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #111827;
  color: #fff;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  animation: toastAnim 2s ease forwards;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes toastAnim {
  0% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  75% { opacity: 1; }
  100% { opacity: 0; }
}

/* Welcome card */
.welcome-card {
  background: linear-gradient(135deg, #ecfdf5, #f0fdf4);
  border: 1px solid #a7f3d0;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.welcome-card .wc-title {
  font-size: 14px; font-weight: 700; margin-bottom: 6px;
}
.welcome-card .wc-text {
  font-size: 12px; color: var(--text2); line-height: 1.6;
}

/* Team matches in detail */
.matches-mini {
  margin-top: 10px;
}
.match-mini-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #f3f4f6;
  font-size: 12px;
  cursor: pointer;
}
.match-mini-row:last-child { border-bottom: none; }
.match-mini-row .mm-teams { flex: 1; font-weight: 600; }
.match-mini-row .mm-date { color: var(--text3); font-size: 11px; white-space: nowrap; }
.match-mini-row .mm-chat {
  color: var(--green); font-size: 11px; font-weight: 600;
  padding: 3px 10px; background: var(--green-light); border-radius: 10px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Fixed Top Bar -->
<div class="top-bar">
  <div class="logo">🏆</div>
  <h1>2026 世界杯 AI 频道</h1>
  <div class="countdown-mini" id="cdMini"></div>
</div>

<!-- Feed -->
<main id="feed">

  <!-- Welcome -->
  <div class="welcome-card">
    <div class="wc-title">👋 欢迎来到世界杯 AI 频道</div>
    <div class="wc-text">
      我是你的 AI 球友 ⚽ 订阅主队获取实时赛况，随时问我任何关于世界杯的问题——战术分析、赛程查询、球员八卦还是规则科普，我都会！
    </div>
  </div>

  <!-- ===== My Teams ===== -->
  <div class="section-head">
    <span class="s-icon">⭐</span> 我的主队
    <span style="font-size:11px;color:var(--text3);font-weight:400;">（点击关注，获取专属赛况推送）</span>
  </div>
  <div class="teams-row" id="teamsRow"></div>
  <div id="teamDetailArea"></div>

  <!-- ===== Group Stage ===== -->
  <div class="section-head">
    <span class="s-icon">📋</span> 小组赛分组
    <a href="#" class="s-more" onclick="askAI('完整赛程表');return false">完整赛程 ›</a>
  </div>
  <div class="groups-grid" id="groupsGrid"></div>

  <!-- ===== AI Analysis ===== -->
  <div class="section-head">
    <span class="s-icon">🧠</span> AI 赛事分析
  </div>
  <div id="analysisArea"></div>

  <!-- ===== Star Players ===== -->
  <div class="section-head">
    <span class="s-icon">🌟</span> 球星看点
  </div>
  <div class="players-row" id="playersRow"></div>

  <!-- ===== Fan Zone ===== -->
  <div class="section-head">
    <span class="s-icon">💬</span> 球迷热聊
  </div>
  <div class="fan-tabs" id="fanTabs"></div>
  <div id="fanContent"></div>

  <!-- ===== Poll ===== -->
  <div class="section-head">
    <span class="s-icon">📊</span> 今日投票
  </div>
  <div id="pollArea"></div>

  <!-- Chat messages appear here -->
  <div id="chatFeed"></div>

  <div style="height:16px"></div>
</main>

<!-- Fixed Bottom Input -->
<div class="input-dock">
  <div class="input-capsules" id="capsules">
    <span class="input-capsule hot" onclick="askAI('今天有什么比赛？')">🔥 今日赛程</span>
    <span class="input-capsule" onclick="askAI('预测一下冠军归属')">🔮 冠军预测</span>
    <span class="input-capsule" onclick="askAI('梅西这届状态怎么样？')">🐐 梅西状态</span>
    <span class="input-capsule" onclick="askAI('新赛制48队怎么踢？')">📖 赛制科普</span>
    <span class="input-capsule" onclick="askAI('越位规则详解')">🤔 越位是什么</span>
  </div>
  <div class="input-row">
    <input type="text" id="chatInput" placeholder="问问 AI 任何世界杯问题..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<script>
// ===== Data: 2026 World Cup Groups =====
const groups = {
  A: [{f:'🇲🇽',n:'墨西哥'},{f:'🇿🇦',n:'南非'},{f:'🇰🇷',n:'韩国'},{f:'🇨🇿',n:'捷克'}],
  B: [{f:'🇧🇦',n:'波黑'},{f:'🇨🇦',n:'加拿大'},{f:'🇶🇦',n:'卡塔尔'},{f:'🇨🇭',n:'瑞士'}],
  C: [{f:'🇧🇷',n:'巴西'},{f:'🇲🇦',n:'摩洛哥'},{f:'🇭🇹',n:'海地'},{f:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',n:'苏格兰'}],

// ===== Countdown =====
function updateCountdown() {
  const target = new Date('2026-06-11T00:00:00-05:00');
  const diff = target - Date.now();
  const el = document.getElementById('cdMini');
  if (diff <= 0) { el.innerHTML = '<span class="live-dot"></span>进行中'; return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff / 3600000) % 24);
  el.textContent = `距开幕 ${d}天${h}时`;
}

function getAiReply(text) {
  for (const [keywords, reply] of Object.entries(aiKb)) {
    const hasMatch = keywords.split('|').some(kw => text.includes(kw));
    if (hasMatch) return reply;
  }
  return `好问题！💡 "${text}"——让我从多个角度帮你分析：\n\n作为世界杯AI助手，我可以从数据统计、战术演变、历史规律、球员状态等维度帮你深度解读。关于这个话题，你想先了解哪个方面？\n\n你也可以试试问我：\n• "预测一下冠军归属"\n• "今天有什么比赛"\n• "越位规则详解"\n• "某队的战术分析"`;
}

function askAI(text) {
  document.getElementById('chatInput').value = '';
  addChatMsg(text, 'user');

  // Show typing
  const typingId = 'typing-' + Date.now();
  const typingEl = document.createElement('div');
  typingEl.id = typingId;
  typingEl.className = 'chat-msg ai';
  typingEl.innerHTML = '<span class="msg-sender">🤖 AI 球友</span>正在输入...';
  document.getElementById('chatFeed').appendChild(typingEl);
  scrollFeed();

  setTimeout(() => {
    const t = document.getElementById(typingId);
    if (t) t.remove();
    addChatMsg(getAiReply(text), 'ai');
    // Update capsules
    updateCapsules(text);
  }, 800 + Math.random() * 1200);
}

function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  askAI(text);
}

function addChatMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  if (role === 'ai') {
    div.innerHTML = '<span class="msg-sender">🤖 AI 球友</span>' + text.replace(/\n/g, '<br>');
  } else {
    div.textContent = text;
  }
  document.getElementById('chatFeed').appendChild(div);
  scrollFeed();
}

function scrollFeed() {
  const feed = document.getElementById('chatFeed');
  setTimeout(() => {
    feed.lastElementChild?.scrollIntoView({ behavior:'smooth', block:'end' });
  }, 100);
}

function updateCapsules(lastQ) {
  const caps = document.getElementById('capsules');
  const dynamic = [
    { text: '💬 继续聊这个话题', cls: 'hot' },
    { text: '📅 相关赛程', cls: '' },
  ];
  const existing = caps.querySelectorAll('.input-capsule');
  // Only add dynamic ones if not already there
  caps.innerHTML = '';
  dynamic.forEach(d => {
    const s = document.createElement('span');
    s.className = 'input-capsule ' + d.cls;
    s.textContent = d.text;
    s.onclick = () => askAI(d.text.replace(/^[^\s]+\s/, ''));
    caps.appendChild(s);
  });
  // Add some static options back
  ['🔥 今日赛程', '🔮 冠军预测', '🐐 梅西状态', '📖 赛制科普'].forEach(t => {
    if (!caps.textContent.includes(t)) {
      const s = document.createElement('span');
      s.className = 'input-capsule' + (t.startsWith('🔥') ? ' hot' : '');
      s.textContent = t;
      s.onclick = () => askAI(t.replace(/^[^\s]+\s/, ''));
      caps.appendChild(s);
    }
  });
}

function toast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2100);
}

// ===== Init =====
init();
</script>
